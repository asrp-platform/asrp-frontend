name: Frontend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check
        continue-on-error: false

      - name: Build Next.js
        run: npm run build

      - name: Build Docker image
        run: docker build -t asrp-frontend-test -f ./docker/Dockerfile .